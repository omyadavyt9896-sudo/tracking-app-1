<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Location Tracking Dashboard</title>
  <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    header {
      background: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      margin-bottom: 20px;
    }

    h1 {
      color: #333;
      margin-bottom: 10px;
    }

    .status {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }

    .status-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .status-indicator {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #ccc;
    }

    .status-indicator.connected {
      background: #4caf50;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .main-content {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }

    @media (max-width: 768px) {
      .main-content {
        grid-template-columns: 1fr;
      }
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    .card h2 {
      color: #333;
      margin-bottom: 15px;
      border-bottom: 2px solid #667eea;
      padding-bottom: 10px;
    }

    .form-group {
      margin-bottom: 15px;
    }

    label {
      display: block;
      margin-bottom: 5px;
      color: #555;
      font-weight: 500;
    }

    input {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 14px;
    }

    button {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 10px 20px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: transform 0.2s;
    }

    button:hover {
      transform: translateY(-2px);
    }

    button:active {
      transform: translateY(0);
    }

    .locations-list {
      max-height: 400px;
      overflow-y: auto;
    }

    .location-item {
      background: #f5f5f5;
      padding: 12px;
      border-radius: 4px;
      margin-bottom: 10px;
      border-left: 4px solid #667eea;
      transition: background 0.2s;
    }

    .location-item:hover {
      background: #efefef;
    }

    .location-id {
      font-weight: 600;
      color: #333;
      margin-bottom: 5px;
    }

    .location-coords {
      color: #666;
      font-size: 13px;
      font-family: monospace;
      margin-bottom: 5px;
    }

    .location-timestamp {
      color: #999;
      font-size: 12px;
    }

    .log-container {
      background: #1e1e1e;
      color: #d4d4d4;
      padding: 15px;
      border-radius: 4px;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      max-height: 300px;
      overflow-y: auto;
      line-height: 1.5;
    }

    .log-entry {
      margin-bottom: 5px;
      padding: 3px 0;
    }

    .log-time {
      color: #4caf50;
    }

    .log-info {
      color: #4fc3f7;
    }

    .log-success {
      color: #66bb6a;
    }

    .log-error {
      color: #ef5350;
    }

    .empty-message {
      color: #999;
      text-align: center;
      padding: 20px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 15px;
      margin-top: 20px;
    }

    .stat-card {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 15px;
      border-radius: 4px;
      text-align: center;
    }

    .stat-number {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 5px;
    }

    .stat-label {
      font-size: 12px;
      opacity: 0.9;
    }

    .tracking-mode {
      background: #e3f2fd;
      border-left: 4px solid #2196f3;
      padding: 12px;
      border-radius: 4px;
      margin-bottom: 15px;
      font-size: 13px;
    }

    .tracking-vehicle {
      font-weight: 600;
      color: #1976d2;
    }

    .hidden {
      display: none;
    }

    .share-button {
      background: #4caf50;
      color: white;
      padding: 8px 16px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      margin-left: 8px;
      transition: background 0.2s;
    }

    .share-button:hover {
      background: #45a049;
    }

    .share-button:active {
      background: #3d8b40;
    }

    .share-feedback {
      color: #4caf50;
      font-size: 12px;
      margin-left: 8px;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .share-feedback.show {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🚗 Vehicle Location Tracker</h1>
      <div class="status">
        <div class="status-item">
          <div class="status-indicator" id="connectionStatus"></div>
          <span id="connectionText">Disconnected</span>
        </div>
        <div class="status-item">
          <span id="vehicleCount">Vehicles tracked: 0</span>
        </div>
        <div class="status-item">
          <span id="updateCount">Updates received: 0</span>
        </div>
        <div class="status-item" id="shareContainer" style="display: none;">
          <button class="share-button" onclick="shareTrackingLink()">📋 Share Link</button>
          <span class="share-feedback" id="shareFeedback">Copied!</span>
        </div>
      </div>
    </header>

    <div class="main-content">
      <!-- Submit Location Card -->
      <div class="card" id="submitCard">
        <div id="trackingMode" class="tracking-mode hidden">
          📍 Tracking: <span class="tracking-vehicle" id="trackedVehicleId"></span>
        </div>
        <h2>📍 Submit Location</h2>
        <div id="formInputs">
          <div class="form-group">
            <label for="vehicleId">Vehicle ID</label>
            <input type="text" id="vehicleId" placeholder="e.g., vehicle-001" value="vehicle-001">
          </div>
          <div class="form-group">
            <label for="latitude">Latitude</label>
            <input type="number" id="latitude" placeholder="40.7128" step="0.0001" value="40.7128">
          </div>
          <div class="form-group">
            <label for="longitude">Longitude</label>
            <input type="number" id="longitude" placeholder="-74.0060" step="0.0001" value="-74.0060">
          </div>
          <button onclick="submitLocation()">Submit Location</button>
          <button onclick="randomLocation()" style="margin-top: 10px;">Random Location</button>
        </div>
      </div>

      <!-- Live Locations Card -->
      <div class="card">
        <h2>📊 Live Locations</h2>
        <div class="locations-list" id="locationsList">
          <div class="empty-message">Waiting for location updates...</div>
        </div>
      </div>
    </div>

    <!-- Event Log -->
    <div class="card">
      <h2>📋 Event Log</h2>
      <div class="log-container" id="logContainer">
        <div class="log-entry"><span class="log-time">[LOG]</span> <span class="log-info">Client initialized. Connecting to server...</span></div>
      </div>
    </div>

    <!-- Statistics -->
    <div class="stats" id="statsContainer"></div>
  </div>

  <script>
    // Configuration
    const SERVER_URL = "https://tracking-backend-06i3.onrender.com";
    
    // State
    let vehicleLocations = {};
    let updateCount = 0;
    let isConnected = false;
    let trackedVehicleId = null;

    // Get vehicleId from URL query parameter
    function getQueryParameter(param) {
      const urlParams = new URLSearchParams(window.location.search);
      return urlParams.get(param);
    }

    // Initialize tracked vehicle mode if vehicleId is in URL
    function initializeTrackedMode() {
      trackedVehicleId = getQueryParameter('vehicleId');
      if (trackedVehicleId) {
        document.getElementById('trackingMode').classList.remove('hidden');
        document.getElementById('trackedVehicleId').textContent = trackedVehicleId;
        document.getElementById('formInputs').classList.add('hidden');
        document.getElementById('shareContainer').style.display = 'flex';
        log(`Tracking mode: ${trackedVehicleId}`, 'success');
      }
    }

    // Share tracking link
    async function shareTrackingLink() {
      const vehicleId = trackedVehicleId || document.getElementById('vehicleId').value.trim();
      
      if (!vehicleId) {
        log('Enter a Vehicle ID to share', 'error');
        return;
      }

      // Generate tracking link
      const trackingLink = `${window.location.origin}${window.location.pathname}?vehicleId=${vehicleId}`;
      
      try {
        // Copy to clipboard
        await navigator.clipboard.writeText(trackingLink);
        
        // Show feedback
        const feedback = document.getElementById('shareFeedback');
        feedback.classList.add('show');
        log(`Link copied: ${trackingLink}`, 'success');
        
        // Hide feedback after 2 seconds
        setTimeout(() => {
          feedback.classList.remove('show');
        }, 2000);
      } catch (error) {
        log(`Error copying link: ${error.message}`, 'error');
      }
    }

    // Initialize Socket.io connection
    const socket = io(SERVER_URL);

    // Socket.io event handlers
    socket.on('connect', () => {
      isConnected = true;
      updateConnectionStatus(true);
      log('Connected to server', 'success');
    });

    socket.on('disconnect', () => {
      isConnected = false;
      updateConnectionStatus(false);
      log('Disconnected from server', 'error');
    });

    socket.on('initialLocations', (locations) => {
      vehicleLocations = locations;
      log(`Received initial locations for ${Object.keys(locations).length} vehicles`, 'info');
      updateLocationsList();
      updateStats();
    });

    socket.on('locationUpdate', (location) => {
      vehicleLocations[location.vehicleId] = location;
      updateCount++;
      log(`Location update: ${location.vehicleId} (${location.lat.toFixed(4)}, ${location.lng.toFixed(4)})`, 'success');
      updateLocationsList();
      updateStats();
      document.getElementById('updateCount').textContent = `Updates received: ${updateCount}`;
    });

    socket.on('error', (error) => {
      log(`Socket error: ${error}`, 'error');
    });

    // Submit location via API
    async function submitLocation() {
      const vehicleId = trackedVehicleId || document.getElementById('vehicleId').value.trim();
      const lat = parseFloat(document.getElementById('latitude').value);
      const lng = parseFloat(document.getElementById('longitude').value);

      if (!vehicleId) {
        log('Vehicle ID is required', 'error');
        return;
      }

      if (isNaN(lat) || isNaN(lng)) {
        log('Latitude and Longitude must be numbers', 'error');
        return;
      }

      try {
        const response = await fetch(`${SERVER_URL}/location`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ vehicleId, lat, lng })
        });

        if (response.ok) {
          log(`Submitted location for ${vehicleId}`, 'success');
        } else {
          log(`Error submitting location: ${response.statusText}`, 'error');
        }
      } catch (error) {
        log(`Error: ${error.message}`, 'error');
      }
    }

    // Submit a random location
    function randomLocation() {
      const vehicleId = trackedVehicleId || document.getElementById('vehicleId').value.trim();
      const lat = (40.7128 + (Math.random() - 0.5) * 0.1).toFixed(4);
      const lng = (-74.0060 + (Math.random() - 0.5) * 0.1).toFixed(4);

      document.getElementById('latitude').value = lat;
      document.getElementById('longitude').value = lng;
      submitLocation();
    }

    // Update connection status indicator
    function updateConnectionStatus(connected) {
      const indicator = document.getElementById('connectionStatus');
      const text = document.getElementById('connectionText');

      if (connected) {
        indicator.classList.add('connected');
        text.textContent = 'Connected';
      } else {
        indicator.classList.remove('connected');
        text.textContent = 'Disconnected';
      }
    }

    // Update locations list display
    function updateLocationsList() {
      const container = document.getElementById('locationsList');
      const locations = Object.values(vehicleLocations);

      if (locations.length === 0) {
        container.innerHTML = '<div class="empty-message">No locations tracked yet</div>';
        return;
      }

      container.innerHTML = locations.map(loc => `
        <div class="location-item">
          <div class="location-id">🚗 ${loc.vehicleId}</div>
          <div class="location-coords">Lat: ${loc.lat.toFixed(4)}, Lng: ${loc.lng.toFixed(4)}</div>
          <div class="location-timestamp">Updated: ${new Date(loc.timestamp).toLocaleTimeString()}</div>
        </div>
      `).join('');

      document.getElementById('vehicleCount').textContent = `Vehicles tracked: ${locations.length}`;
    }

    // Update statistics
    function updateStats() {
      const statsContainer = document.getElementById('statsContainer');
      const vehicleCount = Object.keys(vehicleLocations).length;

      statsContainer.innerHTML = `
        <div class="stat-card">
          <div class="stat-number">${vehicleCount}</div>
          <div class="stat-label">Vehicles</div>
        </div>
        <div class="stat-card">
          <div class="stat-number">${updateCount}</div>
          <div class="stat-label">Updates</div>
        </div>
        <div class="stat-card">
          <div class="stat-number">${isConnected ? '✓' : '✗'}</div>
          <div class="stat-label">Server</div>
        </div>
      `;
    }

    // Logging function
    function log(message, type = 'info') {
      const logContainer = document.getElementById('logContainer');
      const time = new Date().toLocaleTimeString();
      const entry = document.createElement('div');
      entry.className = 'log-entry';

      let typeClass = 'log-info';
      if (type === 'success') typeClass = 'log-success';
      if (type === 'error') typeClass = 'log-error';

      entry.innerHTML = `<span class="log-time">[${time}]</span> <span class="${typeClass}">${message}</span>`;
      logContainer.appendChild(entry);
      logContainer.scrollTop = logContainer.scrollHeight;
    }

    // Initialize stats
    updateStats();
    
    // Initialize tracked vehicle mode
    initializeTrackedMode();
  </script>
</body>
</html>
